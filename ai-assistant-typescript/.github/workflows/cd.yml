name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20.x'

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging' ||
      github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop'
    environment:
      name: staging
      url: https://staging.ai-assistant.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build:prod

      - name: Run database migrations
        run: npm run migrate -- --env=staging
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Deploy to staging server
        run: |
          npm run deploy:staging
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.STAGING_USER }}
          DEPLOY_KEY: ${{ secrets.STAGING_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.STAGING_PATH }}

      - name: Health check
        run: |
          for i in {1..30}; do
            if curl -f https://staging.ai-assistant.example.com/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for service to be ready... ($i/30)"
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Run smoke tests
        run: npm run test:e2e -- --env=staging
        env:
          TEST_BASE_URL: https://staging.ai-assistant.example.com

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Staging deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production' ||
      github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    environment:
      name: production
      url: https://ai-assistant.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --production

      - name: Build project
        run: npm run build:prod

      - name: Create backup
        run: |
          echo "Creating backup of current production..."
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd ${{ secrets.PROD_PATH }} && ./scripts/backup.sh"

      - name: Run database migrations
        run: npm run migrate -- --env=production
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}

      - name: Deploy to production servers
        run: |
          # Deploy to multiple production servers for load balancing
          for server in ${{ secrets.PROD_SERVERS }}; do
            echo "Deploying to $server..."
            npm run deploy:prod -- --server=$server
          done
        env:
          DEPLOY_USER: ${{ secrets.PROD_USER }}
          DEPLOY_KEY: ${{ secrets.PROD_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.PROD_PATH }}

      - name: Update load balancer
        run: |
          # Gradually shift traffic to new deployment
          ./scripts/update-load-balancer.sh --mode=gradual
        env:
          LB_API_KEY: ${{ secrets.LOAD_BALANCER_API_KEY }}

      - name: Health check all servers
        run: |
          for server in ${{ secrets.PROD_SERVERS }}; do
            echo "Checking health of $server..."
            curl -f https://$server/health || exit 1
          done

      - name: Run production tests
        run: npm run test:e2e -- --env=production --minimal
        env:
          TEST_BASE_URL: https://ai-assistant.example.com

      - name: Monitor deployment
        run: |
          # Monitor error rates and performance for 10 minutes
          npm run monitor:deployment -- --duration=600
        env:
          MONITORING_API_KEY: ${{ secrets.MONITORING_API_KEY }}

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed, initiating rollback..."
          ./scripts/rollback.sh --env=production
          exit 1

      - name: Create release notes
        if: success()
        uses: release-drafter/release-drafter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          text: 'Production deployment ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow